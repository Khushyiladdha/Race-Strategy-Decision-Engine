services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rse
      POSTGRES_PASSWORD: rse
      POSTGRES_DB: race_strategy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://rse:rse@db:5432/race_strategy
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata:
